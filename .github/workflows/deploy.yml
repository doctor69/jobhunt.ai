name: Deploy Dashboard

on:
  workflow_run:
    workflows: ["Scan Jobs", "Apply to Jobs"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # Only deploy when the triggering workflow succeeded (or on manual dispatch)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Wait 5 minutes for data to settle
        if: github.event_name == 'workflow_run'
        run: sleep 300

      - uses: actions/checkout@v4

      - name: Copy data into docs for Pages
        run: |
          mkdir -p docs/data
          cp data/jobs.json    docs/data/jobs.json
          cp data/applied.json docs/data/applied.json

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - id: deploy
        uses: actions/deploy-pages@v4
