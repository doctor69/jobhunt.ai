name: Deploy Dashboard

on:
  push:
    branches: [main, Initial]
    paths:
      - 'docs/**'
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Copy data into docs for Pages
        run: |
          mkdir -p docs/data
          cp data/jobs.json   docs/data/jobs.json
          cp data/applied.json docs/data/applied.json

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - id: deploy
        uses: actions/deploy-pages@v4
